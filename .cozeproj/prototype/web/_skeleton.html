<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #00E676;
      --color-primary-container:    #00C853;
      --color-on-primary:           #000000;
      /* === 背景 / 表面 === */
      --color-background:                 #0D1117;
      --color-surface-container-lowest:   #010409;
      --color-surface:                    #161B22;
      --color-surface-container:          #21262D;
      --color-surface-container-high:     #30363D;
      --color-surface-container-highest:  #484F58;
      /* === 文字 === */
      --color-on-surface:           #E6EDF3;
      --color-on-surface-variant:   #8B949E;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #30363D;
      --color-outline-variant:  #21262D;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.25rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.4);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.5), 0 0 15px rgba(0,230,118,0.15);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.6);
      /* === 字体 === */
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans min-h-screen relative overflow-hidden">

  <!-- 背景模拟：富民系统页面 -->
  <div class="absolute inset-0 bg-surface-container-lowest opacity-50"></div>
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
    <div class="text-on-surface-variant/20 text-6xl font-bold select-none">富民催收系统</div>
  </div>

  <!-- @main-content:start -->
  <main class="relative z-10 flex items-center justify-center min-h-screen p-8">

    <!-- 悬浮工具面板 -->
    <div class="w-72 bg-surface rounded-xl shadow-float border border-outline/30 overflow-hidden" style="box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 20px rgba(0,230,118,0.12);">

      <!-- 标题栏 -->
      <div class="flex items-center justify-between px-4 py-3 bg-surface-container-high border-b border-outline/20">
        <div class="flex items-center gap-2">
          <i data-lucide="bot" class="w-4 h-4 text-primary"></i>
          <span class="text-sm font-semibold text-on-surface">富民系统小助手</span>
        </div>
        <div class="flex items-center gap-1">
          <button class="p-1 rounded hover:bg-surface-container-high text-on-surface-variant hover:text-on-surface transition-colors" title="缩小">
            <i data-lucide="minus" class="w-3.5 h-3.5"></i>
          </button>
          <button class="p-1 rounded hover:bg-surface-container-high text-on-surface-variant hover:text-on-surface transition-colors" title="放大">
            <i data-lucide="plus" class="w-3.5 h-3.5"></i>
          </button>
          <button class="p-1 rounded hover:bg-surface-container-high text-on-surface-variant hover:text-on-surface transition-colors" title="折叠">
            <i data-lucide="chevron-up" class="w-3.5 h-3.5"></i>
          </button>
        </div>
      </div>

      <!-- Token 状态 -->
      <div class="px-4 py-2.5 flex items-center gap-2 border-b border-outline/10">
        <div class="w-2 h-2 rounded-full bg-success" style="box-shadow: 0 0 6px rgba(34,197,94,0.5);"></div>
        <span class="text-xs text-success font-medium">Token 已设置</span>
      </div>

      <!-- 功能按钮区 -->
      <div class="p-3 space-y-2">
        <button class="w-full py-2.5 px-3 bg-primary/15 text-primary rounded-lg text-sm font-medium hover:bg-primary/25 transition-all border border-primary/20 flex items-center gap-2">
          <i data-lucide="message-square" class="w-4 h-4"></i>
          查询短信数据
        </button>
      </div>

      <!-- 底部名言 -->
      <div class="px-4 py-2.5 border-t border-outline/10">
        <p class="text-xs text-on-surface-variant/60 italic text-center">每一次沟通，都是信任的积累。</p>
      </div>
    </div>

  </main>
  <!-- @main-content:end -->

  <script>lucide.createIcons();</script>
</body>

</html>
